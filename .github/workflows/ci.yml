name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev,faiss,serve]"
      - run: multimodal-retrieval-ops --version
      - run: multimodal-retrieval-ops project-info
      - run: multimodal-retrieval-ops run-portfolio-smoke
      - run: pytest -q
      - run: ruff check .
      - run: git diff --check
